# =============================================================================
# config.example.yaml
#
# This is the single source of truth for a deployment. Copy this file to
# `config.yaml` in the repo root, edit the values, and then either:
#
#   * Run `scripts/deploy.sh` — it reads config.yaml directly.
#   * Or run `cd terraform && cp terraform.tfvars.example terraform.tfvars`
#     and copy the same values into the tfvars file (names match 1:1).
#
# Every field has an inline comment explaining what it does and what happens
# if you change it. When in doubt, leave the default.
# =============================================================================


# -----------------------------------------------------------------------------
# REQUIRED — which GCP project to deploy into.
# This must be a project where you have Owner or Editor, and which has
# billing enabled. Get it from: https://console.cloud.google.com/
# -----------------------------------------------------------------------------
project_id: "my-gcp-project"


# -----------------------------------------------------------------------------
# Region for Vertex AI calls.
#
# "global" is the recommended default. It uses Vertex's multi-region endpoint
# for Anthropic models — new model versions land there first, there's no
# regional price premium, and Google auto-routes to the closest available
# backend.
#
# Pick a specific region if you have data-residency requirements. Common
# options:
#   us-east5         (Columbus, OH)  — most mature Claude region
#   us-central1      (Iowa)
#   europe-west1     (Belgium)
#   europe-west3     (Frankfurt)     — for EU data residency
#   europe-west4     (Netherlands)
#   asia-southeast1  (Singapore)
#   asia-northeast1  (Tokyo)
#   us               (multi-region)
#   europe           (multi-region)
#
# You can also type any region string; the deploy script won't block you.
# Live availability per model: https://console.cloud.google.com/vertex-ai/model-garden
# -----------------------------------------------------------------------------
region: "global"


# -----------------------------------------------------------------------------
# Which components to deploy.
# -----------------------------------------------------------------------------
components:
  # The LLM gateway is the core component. It cannot be disabled — deploying
  # without it defeats the purpose of this repo.
  llm_gateway: true

  # The MCP gateway is highly recommended but optional. Turn off if you only
  # want the bare minimum — you can always enable it later.
  mcp_gateway: true

  # The dev VM is off by default. Turn on if your developers cannot install
  # Claude Code locally, or if they want a cloud dev environment.
  dev_vm: false

  # The dev portal is a tiny static page that tells developers how to set
  # up their machines. Cheap to run; recommended on.
  dev_portal: true

  # Observability installs a log sink → BigQuery and references a Looker
  # Studio template. Small cost (~$0–2/month) but enormous usefulness.
  observability: true


# -----------------------------------------------------------------------------
# Dev VM configuration — only used when components.dev_vm is true.
# -----------------------------------------------------------------------------
dev_vm:
  # "shared"   = one VM that all developers use (cheap, simple, no isolation)
  # "per_user" = one VM per developer (stronger isolation, higher cost)
  mode: "shared"

  # Machine type. e2-small is fine for light use.
  # Upgrade to e2-medium / e2-standard-4 for serious work.
  machine_type: "e2-small"

  # Boot disk size in GB. 30 GB is enough for Claude Code + VS Code Server +
  # a modest source tree. Bump for larger repos.
  disk_size_gb: 30

  # Auto-shutdown idle threshold. Set to 0 to disable auto-shutdown.
  # The VM powers down after this many hours without any SSH connections.
  auto_shutdown_idle_hours: 2

  # If true, installs code-server (VS Code in the browser) and exposes it
  # behind an IAP-protected HTTPS load balancer.
  install_vscode_server: true


# -----------------------------------------------------------------------------
# Networking.
# -----------------------------------------------------------------------------
networking:
  # Private Service Connect for Vertex endpoint access.
  #
  # Off by default. Only turn on if you have on-prem developers hitting this
  # deployment via Cloud Interconnect — then PSC gives you a private IP
  # inside your VPC for googleapis.com.
  #
  # Costs ~$7–10/month extra when enabled.
  use_psc: false

  # Whether Cloud Run services are wired through a Serverless VPC Connector
  # so their egress stays on the private VPC path. If you have no
  # compliance reason to require private egress, leave this off and save
  # ~$10/month (connector has a minimum billed instance).
  use_vpc_connector: true


# -----------------------------------------------------------------------------
# Access control.
#
# Google identities (users or groups) granted access to this deployment.
# Every principal here gets:
#   * run.invoker on the LLM and MCP gateways
#   * iap.tunnelResourceAccessor and compute.osLogin on the dev VM
#   * Access to the IAP-protected dev portal
#
# Format is IAM "member" strings:
#   user:[email protected]
#   group:[email protected]
#   serviceAccount:[email protected]
# -----------------------------------------------------------------------------
access:
  allowed_principals:
    - "user:[email protected]"
    # - "group:[email protected]"


# -----------------------------------------------------------------------------
# Model defaults.
# -----------------------------------------------------------------------------
models:
  # When true, the developer-setup.sh script writes pinned model IDs into
  # ~/.claude/settings.json so your team uses consistent versions.
  # Recommended for enterprise rollouts.
  pin_versions: true

  # The pinned model IDs. These match the exact Vertex model IDs.
  # Check Model Garden for the latest if you want to roll forward.
  opus: "claude-opus-4-6"
  sonnet: "claude-sonnet-4-6"
  haiku: "claude-haiku-4-5@20251001"
